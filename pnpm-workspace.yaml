packages:
  # all packages (UI5 CLI extensions)
  - "packages/*"
  # all showcases (demo apps, libs, modules, cds-ui5 apps, ...)
  - "showcases/*"
  - "showcases/cds-bookshop/app/*"

overrides:
  chromedriver: ">=115"
  # Force-patch transitive dependencies flagged by dependabot.
  # Each entry is range-scoped so the override only kicks in for versions
  # that are vulnerable AND have a patch within the same major. Cases
  # where the only fix is in a newer major (tough-cookie 2/3 → 4,
  # node-fetch 1 → 2, fabric 4 → 7, @octokit/request 6 → 8, etc.) are
  # NOT overridden here: the cross-major bump would force-upgrade
  # transitive consumers and is more likely to break than to fix.
  "minimatch@<3.1.4": ">=3.1.4"
  "qs@<6.14.1": ">=6.14.1"
  "ws@>=8.0.0 <8.20.1": ">=8.20.1"
  "tmp@>=0.2.0 <0.2.6": ">=0.2.6"
  "tar-fs@>=3.0.0 <3.1.1": ">=3.1.1"
  "form-data@>=2.0.0 <2.5.4": ">=2.5.4"
  "lodash@>=4.0.0 <4.18.0": ">=4.18.0"

allowBuilds:
  "@firebase/util": false
  better-sqlite3: true
  canvas: true
  core-js: false
  edgedriver: true
  esbuild: false
  geckodriver: true
  nx: true
  playwright-chromium: true
  protobufjs: true
  tree-sitter: true
  tree-sitter-java: true

enablePrePostScripts: false

# Refuse to install package versions younger than this many minutes. The
# typical npm-worm window (Shai-Hulud, etc.) is hours: malicious
# versions are usually yanked well within a day. pnpm 11 defaults to
# 1440 (24h); pin it explicitly so the setting can't silently change
# under us if pnpm flips the default in a future major, and so
# anyone running pnpm 10 here picks up the same behavior.
minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - "@eslint/plugin-kit@0.7.2"
  - eslint@10.4.1
  - lint-staged@17.0.6
